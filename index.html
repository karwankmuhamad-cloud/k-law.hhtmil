<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سیستەمی دابەشکردنی ژورەکان</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans Arabic',Tahoma,Arial,sans-serif}
body{min-height:100vh;direction:rtl;color:#fff;padding:18px;background:linear-gradient(135deg,rgba(3,20,38,.92),rgba(3,70,55,.72)),radial-gradient(circle at top right,rgba(255,193,7,.22),transparent 35%),radial-gradient(circle at bottom left,rgba(0,200,120,.22),transparent 40%),#071c2f}
.app{max-width:1400px;margin:auto}
.glass{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);box-shadow:0 18px 45px rgba(0,0,0,.25);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.header{border-radius:24px;padding:22px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:14px;background:linear-gradient(135deg,rgba(0,90,70,.75),rgba(6,34,70,.65))}
.title h1{font-size:26px;font-weight:900}.title p{opacity:.9;margin-top:4px}.kaaba{font-size:46px;width:82px;height:82px;display:flex;align-items:center;justify-content:center;border-radius:24px;background:rgba(255,255,255,.16)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}.stat{border-radius:22px;padding:18px;display:flex;align-items:center;gap:14px}.stat .icon{width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;background:linear-gradient(135deg,#10b981,#0ea5e9)}.stat b{font-size:30px;display:block}.stat span{opacity:.9}
.controls{border-radius:22px;padding:14px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr 140px 140px 140px 150px 150px;gap:10px}
input,select,textarea,button{border:0;outline:0;border-radius:15px;padding:13px 14px;font-size:15px}input,select,textarea{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.18)}input::placeholder,textarea::placeholder{color:rgba(255,255,255,.72)}select option{color:#111}button{cursor:pointer;font-weight:900;color:white;background:linear-gradient(135deg,#10b981,#047857)}button.blue{background:linear-gradient(135deg,#2563eb,#1e40af)}button.red{background:linear-gradient(135deg,#ef4444,#b91c1c)}button.gold{background:linear-gradient(135deg,#f59e0b,#b45309)}
.layout{display:grid;grid-template-columns:2fr 1fr;gap:16px}.rooms-panel,.info-panel{border-radius:24px;padding:16px}.section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.section-title h2{font-size:24px}.filters{display:grid;grid-template-columns:1fr 150px 150px 150px;gap:10px;margin-bottom:14px}.rooms{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.room{position:relative;overflow:hidden;min-height:185px;border-radius:22px;padding:16px;cursor:pointer;transition:.25s;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2)}.room:hover{transform:translateY(-4px);border-color:rgba(255,215,120,.7);box-shadow:0 15px 35px rgba(0,0,0,.25)}.room.empty{background:linear-gradient(135deg,rgba(16,185,129,.24),rgba(255,255,255,.10))}.room.mid{background:linear-gradient(135deg,rgba(245,158,11,.26),rgba(255,255,255,.10))}.room.full{background:linear-gradient(135deg,rgba(239,68,68,.28),rgba(255,255,255,.10))}.room h3{font-size:34px;font-weight:900;color:#f8fafc}.room .emoji{position:absolute;top:18px;left:16px;font-size:42px}.badge{display:inline-block;margin-top:8px;padding:6px 12px;border-radius:999px;font-weight:900}.badge.empty{background:#10b981}.badge.mid{background:#f59e0b}.badge.full{background:#ef4444}.room p{margin-top:8px;font-size:14px;opacity:.92}.beds{margin-top:14px;padding:10px;border-radius:15px;background:rgba(0,0,0,.17);font-size:18px;font-weight:900}
.info-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}.info-icon{width:54px;height:54px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;background:linear-gradient(135deg,#6366f1,#0ea5e9)}.guest-list{max-height:420px;overflow:auto;margin-top:12px}.guest{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px;margin-bottom:8px;border-radius:14px;background:rgba(255,255,255,.08)}.guest-name{font-weight:800}.form{display:grid;gap:10px;margin-top:14px}.form h3{margin-bottom:4px}.print-area{display:none}
@media(max-width:1100px){.layout{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.controls{grid-template-columns:1fr 1fr}.filters{grid-template-columns:1fr 1fr}}
@media(max-width:700px){body{padding:10px}.header{padding:16px}.title h1{font-size:20px}.kaaba{width:64px;height:64px;font-size:36px}.stats{grid-template-columns:1fr}.controls{grid-template-columns:1fr}.filters{grid-template-columns:1fr}}
@media print{
@page{size:A4 landscape;margin:5mm}
html,body{width:297mm;min-height:210mm;background:white!important;color:black!important;padding:0!important;margin:0!important;overflow:hidden!important}
.app{max-width:none!important;width:100%!important;margin:0!important}
.app>*{display:none!important}
.print-area{display:block!important;width:100%!important;padding:0!important;font-size:8px!important;line-height:1.15!important}
.print-title{text-align:center;margin:0 0 3mm 0!important}
.print-title h1{font-size:15px!important;margin:0!important}
.print-title p{font-size:9px!important;margin:0!important}
#printBox{display:grid!important;grid-template-columns:repeat(4,1fr)!important;gap:2mm!important;align-items:start!important}
.print-room{border:1px solid #000!important;margin:0!important;padding:2mm!important;border-radius:3px!important;page-break-inside:avoid!important;break-inside:avoid!important;overflow:hidden!important}
.print-room h3{font-size:10px!important;margin:0 0 1mm 0!important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.print-room p{font-size:7.5px!important;margin:0 0 1mm 0!important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
table{width:100%!important;border-collapse:collapse!important;table-layout:fixed!important}
th,td{border:1px solid #000!important;padding:1mm!important;text-align:center!important;font-size:7.5px!important;line-height:1.1!important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
th:first-child,td:first-child{width:9mm!important}
button{display:none!important}
}
</style>
</head>
<body>
<div class="app">
  <div class="header glass">
    <div class="title"><h1>🕋 سیستەمی دابەشکردنی ژورەکانی هوتێل</h1><p>حەج و عومرە - سیواک</p></div>
    <div class="kaaba">🕋</div>
  </div>
  <div class="stats">
    <div class="stat glass"><div class="icon">🏨</div><div><span>کۆی ژورەکان</span><b id="totalRooms">0</b></div></div>
    <div class="stat glass"><div class="icon">👥</div><div><span>کۆی گەشتیاران</span><b id="totalGuests">0</b></div></div>
    <div class="stat glass"><div class="icon">🛏️</div><div><span>شوێنی بەتاڵ</span><b id="emptyBeds">0</b></div></div>
    <div class="stat glass"><div class="icon">🕋</div><div><span>هوتێلەکان</span><b id="hotelCount">0</b></div></div>
  </div>
  <div class="controls glass">
    <input id="roomNumber" placeholder="🏨 ژمارەی ژور">
    <input id="hotelName" placeholder="🕋 ناوی هوتێل">
    <select id="city"><option value="مەککە">🕋 مەککە</option><option value="مەدینە">🕌 مەدینە</option></select>
    <select id="capacity"><option value="2">🛏️ ٢ کەسی</option><option value="3">🛏️ ٣ کەسی</option><option value="4" selected>🛏️ ٤ کەسی</option><option value="5">🛏️ ٥ کەسی</option></select>
    <select id="gender"><option value="پیاو">👳 پیاو</option><option value="ئافرەت">🧕 ئافرەت</option></select>
    <button onclick="addRoom()">➕ زیادکردنی ژور</button>
    <button class="blue" onclick="window.print()">🖨 چاپکردنی لیست</button>
  </div>
  <div class="layout">
    <div class="rooms-panel glass">
      <div class="section-title"><h2>🛏️ ژورەکان</h2></div>
      <div class="filters">
        <input id="searchRoom" placeholder="🔍 گەڕان">
        <select id="filterCity"><option value="">هەموو شارەکان</option><option value="مەککە">مەککە</option><option value="مەدینە">مەدینە</option></select>
        <select id="filterGender"><option value="">هەموو جۆرەکان</option><option value="پیاو">پیاو</option><option value="ئافرەت">ئافرەت</option></select>
        <select id="filterStatus"><option value="">هەموو</option><option value="empty">بەتاڵ</option><option value="mid">نیوە پڕ</option><option value="full">پڕ</option></select>
      </div>
      <div id="roomsBox" class="rooms"></div>
    </div>
    <div class="info-panel glass">
      <div id="roomInfo"><div class="info-head"><div class="info-icon">🛏️</div><div><h2>زانیاری ژور</h2><p>ژورێک هەڵبژێرە</p></div></div></div>
      <div id="guestForm" class="form" style="display:none">
        <h3>👥 زیادکردنی گەشتیار</h3>
        <input id="guestName" placeholder="👤 ناوی گەشتیار">
        <button onclick="addGuest()">➕ زیادکردنی گەشتیار</button>
        <button class="red" onclick="deleteRoom()">🗑 سڕینەوەی ژور</button>
      </div>
    </div>
  </div>
  <div class="print-area">
    <div class="print-title"><h1>لیستی ژورەکان</h1><p>سیواک - حەج و عومرە</p></div>
    <div id="printBox"></div>
  </div>
</div>
<script>
const SUPABASE_URL = "https://gnatnabbjmvxmigtugtv.supabase.co";
const SUPABASE_KEY = "sb_publishable_EB6K4oP-AK16XPPLREGAXA_FxMbIGN7";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let rooms = [], guests = [], selectedRoom = null;
async function loadData(){
  const {data:roomData,error:roomErr}=await db.from("hotel_rooms").select("*").order("room_number");
  const {data:guestData,error:guestErr}=await db.from("room_guests").select("*").order("created_at");
  if(roomErr||guestErr){alert("کێشە هەیە لە هێنانی داتا");console.log(roomErr||guestErr);return;}
  rooms=roomData||[];guests=guestData||[];renderStats();renderRooms();renderPrint();
}
function getRoomStatus(room){const count=guests.filter(g=>g.room_id===room.id).length;const cap=Number(room.capacity||0);if(count===0)return"empty";if(count>=cap)return"full";return"mid";}
function roomEmoji(room){if(room.gender==="ئافرەت")return"🧕";if(room.gender==="پیاو")return"👳";return"🛏️";}
function renderStats(){const totalCapacity=rooms.reduce((sum,r)=>sum+Number(r.capacity||0),0);const hotels=[...new Set(rooms.map(r=>r.hotel_name).filter(Boolean))];document.getElementById("totalRooms").innerText=rooms.length;document.getElementById("totalGuests").innerText=guests.length;document.getElementById("emptyBeds").innerText=totalCapacity-guests.length;document.getElementById("hotelCount").innerText=hotels.length;}
function renderRooms(){
  const box=document.getElementById("roomsBox"), search=document.getElementById("searchRoom").value.trim(), city=document.getElementById("filterCity").value, gender=document.getElementById("filterGender").value, status=document.getElementById("filterStatus").value;
  box.innerHTML="";
  const filtered=rooms.filter(room=>{const st=getRoomStatus(room);if(search&&!String(room.room_number).includes(search)&&!(room.hotel_name||"").includes(search))return false;if(city&&room.city!==city)return false;if(gender&&room.gender!==gender)return false;if(status&&st!==status)return false;return true;});
  if(filtered.length===0){box.innerHTML='<p style="opacity:.85">هیچ ژورێک نەدۆزرایەوە</p>';return;}
  filtered.forEach(room=>{const count=guests.filter(g=>g.room_id===room.id).length, cap=Number(room.capacity||0), st=getRoomStatus(room);let statusText="بەتاڵ";if(st==="mid")statusText="نیوە پڕ";if(st==="full")statusText="پڕ";box.innerHTML+=`<div class="room ${st}" onclick="selectRoom(${room.id})"><div class="emoji">${roomEmoji(room)}</div><h3>${room.room_number}</h3><div class="beds">🛏️ ${count}/${cap} شوێن</div><span class="badge ${st}">${statusText}</span><p>🏨 ${room.hotel_name||"-"}</p><p>📍 ${room.city||"-"}</p><p>${room.gender==="ئافرەت"?"🧕":"👳"} ${room.gender||"-"}</p></div>`;});
}
function selectRoom(id){
  selectedRoom=rooms.find(r=>r.id===id);if(!selectedRoom)return;const roomGuests=guests.filter(g=>g.room_id===id), cap=Number(selectedRoom.capacity||0);
  let html=`<div class="info-head"><div class="info-icon">🛏️</div><div><h2>ژور ${selectedRoom.room_number}</h2><p>${selectedRoom.hotel_name||"-"}</p></div></div><p>🏨 هوتێل: ${selectedRoom.hotel_name||"-"}</p><p>📍 شار: ${selectedRoom.city||"-"}</p><p>${selectedRoom.gender==="ئافرەت"?"🧕":"👳"} جۆر: ${selectedRoom.gender||"-"}</p><p>🛏️ شوێنی نوستن: ${roomGuests.length}/${cap}</p><div class="guest-list">`;
  if(roomGuests.length===0)html+=`<p style="opacity:.8;margin-top:12px">هیچ گەشتیارێک لەم ژورە نیە</p>`;
  roomGuests.forEach(g=>{html+=`<div class="guest"><div><div class="guest-name">👤 ${g.guest_name}</div></div><button class="red" onclick="deleteGuest(${g.id})">🗑</button></div>`;});
  html+=`</div>`;document.getElementById("roomInfo").innerHTML=html;document.getElementById("guestForm").style.display="grid";
}
async function addRoom(){const room_number=document.getElementById("roomNumber").value.trim(), hotel_name=document.getElementById("hotelName").value.trim(), city=document.getElementById("city").value, capacity=document.getElementById("capacity").value, gender=document.getElementById("gender").value;if(!room_number){alert("ژمارەی ژور بنوسە");return;}const {error}=await db.from("hotel_rooms").insert({room_number,hotel_name,city,capacity,gender});if(error){alert("ژور زیاد نەکرا");console.log(error);return;}document.getElementById("roomNumber").value="";document.getElementById("hotelName").value="";await loadData();}
async function addGuest(){if(!selectedRoom){alert("یەکەم ژور هەڵبژێرە");return;}const roomGuests=guests.filter(g=>g.room_id===selectedRoom.id);if(roomGuests.length>=Number(selectedRoom.capacity)){alert("ئەم ژورە پڕە");return;}const guest_name=document.getElementById("guestName").value.trim();if(!guest_name){alert("ناوی گەشتیار بنوسە");return;}const {error}=await db.from("room_guests").insert({room_id:selectedRoom.id,guest_name});if(error){alert("گەشتیار زیاد نەکرا");console.log(error);return;}document.getElementById("guestName").value="";await loadData();selectRoom(selectedRoom.id);}
async function deleteGuest(id){if(!confirm("دڵنیایت لە سڕینەوەی ئەم گەشتیارە؟"))return;const {error}=await db.from("room_guests").delete().eq("id",id);if(error){alert("نەتوانرا گەشتیار بسڕدرێتەوە");console.log(error);return;}await loadData();if(selectedRoom)selectRoom(selectedRoom.id);}
async function deleteRoom(){if(!selectedRoom)return;if(!confirm("دڵنیایت لە سڕینەوەی ئەم ژورە؟"))return;const {error}=await db.from("hotel_rooms").delete().eq("id",selectedRoom.id);if(error){alert("ژورەکە نەسڕدرایەوە");console.log(error);return;}selectedRoom=null;document.getElementById("roomInfo").innerHTML=`<div class="info-head"><div class="info-icon">🛏️</div><div><h2>زانیاری ژور</h2><p>ژورێک هەڵبژێرە</p></div></div>`;document.getElementById("guestForm").style.display="none";await loadData();}
function renderPrint(){const printBox=document.getElementById("printBox");printBox.innerHTML="";rooms.forEach(room=>{const roomGuests=guests.filter(g=>g.room_id===room.id);let rows="";if(roomGuests.length===0){rows=`<tr><td colspan="2">بەتاڵە</td></tr>`;}else{roomGuests.forEach((g,i)=>{rows+=`<tr><td>${i+1}</td><td>${g.guest_name}</td></tr>`;});}printBox.innerHTML+=`<div class="print-room"><h3>ژور ${room.room_number} - ${room.hotel_name||""}</h3><p>شار: ${room.city||""} | جۆر: ${room.gender||""} | شوێن: ${roomGuests.length}/${room.capacity}</p><table><thead><tr><th>#</th><th>ناوی گەشتیار</th></tr></thead><tbody>${rows}</tbody></table></div>`;});}
document.getElementById("searchRoom").addEventListener("input",renderRooms);document.getElementById("filterCity").addEventListener("change",renderRooms);document.getElementById("filterGender").addEventListener("change",renderRooms);document.getElementById("filterStatus").addEventListener("change",renderRooms);loadData();
</script>
</body>
</html>
